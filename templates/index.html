<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="color-scheme" content="dark">
    <meta name="theme-color" content="#0e1014">
    <title>Marriage Card Game</title>
    {% load static %}
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <div id="home-container">
        <h1>Marriage</h1>
        <button id="show-create-modal-btn" class="btn btn-primary">Create Game</button>
        <button id="show-join-modal-btn" class="btn btn-secondary">Join Game</button>
    </div>

    <!-- Create Game Modal -->
    <div id="create-modal" class="modal">
        <div class="modal-content">
            <h2>Create New Game</h2>
            <div class="form-group">
                <label for="create-player-name">Your Name</label>
                <input type="text" id="create-player-name" class="form-control" placeholder="Enter your name">
            </div>
            <div class="form-group">
                <label for="create-num-players">Number of Players</label>
                <select id="create-num-players" class="form-control">
                    <option value="2">2 Players</option>
                    <option value="3">3 Players</option>
                    <option value="4" selected>4 Players</option>
                    <option value="5">5 Players</option>
                    <option value="6">6 Players</option>
                </select>
            </div>
            <div class="form-group">
                <label>Players</label>
                <div id="seat-config"><!-- seat rows injected by UIManager --></div>
            </div>
            <div class="modal-actions">
                <button id="cancel-create-btn" class="btn btn-sm btn-cancel">Cancel</button>
                <button id="confirm-create-btn" class="btn btn-sm btn-primary">Create</button>
            </div>
        </div>
    </div>

    <!-- Join Game Modal -->
    <div id="join-modal" class="modal">
        <div class="modal-content">
            <h2>Join Game</h2>
            <div class="form-group">
                <label>Ongoing Games</label>
                <div id="ongoing-games"><!-- joinable games injected by UIManager --></div>
            </div>
            <div class="form-group">
                <label for="join-player-name">Your Name</label>
                <input type="text" id="join-player-name" class="form-control" placeholder="Pick a seat above, or type a name">
                <small class="hint">Returning to a game? Enter the same name and code to rejoin your seat.</small>
            </div>
            <div class="form-group">
                <label for="join-game-id">Game Code</label>
                <input type="text" id="join-game-id" class="form-control" placeholder="e.g. ABCD">
            </div>
            <div class="modal-actions">
                <button id="cancel-join-btn" class="btn btn-sm btn-cancel">Cancel</button>
                <button id="confirm-join-btn" class="btn btn-sm btn-secondary">Join</button>
            </div>
        </div>
    </div>

    <div id="game-container">
        <!-- D3/Three.js content will go here -->
        <div id="turn-indicator"></div>
        <div id="game-log"></div>
        <div id="shown-sequences-container"></div>

        <div id="game-controls">
            <button id="show-sequence-btn" class="btn btn-primary btn-sm">Show Sequence</button>
            <button id="show-tunnela-btn" class="btn btn-primary btn-sm" style="display: none;">Show Tunnela</button>
            <button id="show-dublee-btn" class="btn btn-primary btn-sm" style="display: none;">Show Dublee</button>
            <button id="claim-game-btn" class="btn btn-secondary btn-sm" style="display: none;">Claim Game</button>
        </div>

        <div id="sequence-controls" style="display: none;">
            <button id="validate-seq-btn" class="btn btn-secondary btn-sm">Validate Sequence</button>
            <button id="cancel-sequence-btn" class="btn btn-cancel btn-sm">Cancel</button>
        </div>

        <!-- F1: in-game emote menu. Toggle button opens a grid of gesture
             buttons; each sends a networked gesture via UIManager -> SocketManager. -->
        <div id="emote-controls">
            <div id="emote-menu">
                <button class="emote-btn" data-gesture="wave"      title="Wave">👋</button>
                <button class="emote-btn" data-gesture="nod"       title="Nod (yes)">🙆</button>
                <button class="emote-btn" data-gesture="shake"     title="Shake (no)">🙅</button>
                <button class="emote-btn" data-gesture="jump"      title="Jump">⤴️</button>
                <button class="emote-btn" data-gesture="celebrate" title="Celebrate">🎉</button>
                <button class="emote-btn" data-gesture="cry"       title="Cry">😭</button>
                <button class="emote-btn" data-gesture="think"     title="Think">🤔</button>
                <button class="emote-btn" data-gesture="point"     title="Point">👉</button>
                <button class="emote-btn" data-gesture="clap"      title="Clap">👏</button>
                <button class="emote-btn" data-gesture="facepalm"  title="Facepalm">🤦</button>
                <button class="emote-btn" data-gesture="shrug"     title="Shrug">🤷</button>
            </div>
            <button id="emote-toggle" class="btn btn-secondary btn-sm" title="Emotes">😀</button>
        </div>

        <!-- F2: quick-chat. #chat-panel = received-message log, #chat-quick =
             phrase picker (buttons injected by GameController.setupQuickChat). -->
        <div id="chat-box">
            <div id="chat-panel"></div>
            <div id="chat-quick"></div>
        </div>
    </div>

    <!-- Maal Selection Modal -->
    <div id="maal-modal" class="modal">
        <div class="modal-content" style="max-width: 600px;">
            <h2>Select Maal Card</h2>
            <p>Select a card from the deck to be the Maal card. This card will be placed at the bottom of the deck.</p>
            <div id="maal-card-list" class="card-slider">
                <!-- Cards will be dynamically added here -->
            </div>
            <div class="modal-actions">
                <button id="confirm-maal-btn" class="btn btn-sm btn-primary">Confirm Maal</button>
            </div>
        </div>
    </div>

    <!-- Win / lose banner hook for GAME_CLAIMED (shown/populated by JS) -->
    <div id="game-banner">
        <div class="banner-card">
            <h2 class="banner-title" id="game-banner-title"></h2>
            <p class="banner-msg" id="game-banner-msg"></p>
            <button class="btn btn-primary btn-sm" id="game-banner-btn">Play again</button>
        </div>
    </div>

    <!-- Toast notifications mount point (window.toast) -->
    <div id="toast-container" aria-live="polite" aria-atomic="true"></div>

    <script type="module" src="{% static 'js/main.js' %}"></script>
</body>
</html>
