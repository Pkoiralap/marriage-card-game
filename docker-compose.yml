version: '3.8'

services:
  node-app:
    build: 
      context: .
      dockerfile: Dockerfile
      no_cache: true

    image: node-app
    environment:
      - MONGODB_URL=mongodb://mongodb:27017
      - DB_NAME=marriage
    ports:
      - '8085:8085'
    depends_on:
      mongodb: 
        condition: service_healthy
        restart: true
    volumes:
      - .:/src
    networks:
      - node-network

  mongodb:
    image: mongo:6-jammy
    ports:
      - '27017:27017'
    volumes:
      - dbdata6:/data/db
    networks:
      - node-network
    healthcheck:
      test: ["CMD","mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 3
      start_period: 5s

volumes:
  dbdata6:

networks:
  node-network:
    driver: bridge
